server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy cho Backend API & WebSocket
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # QUAN TRỌNG: Bỏ qua trang cảnh báo của Ngrok
        proxy_set_header ngrok-skip-browser-warning "69420";
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Bổ sung riêng cho Socket.io để đảm bảo không lỗi path
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        
        # Bỏ qua trang cảnh báo của Ngrok
        proxy_set_header ngrok-skip-browser-warning "69420";
    }

    # Cấu hình cache cho static assets
    location /assets {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
